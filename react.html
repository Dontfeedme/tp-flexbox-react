<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 3 — Personas (React)</title>
  <!-- Estilos compartidos -->
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    /* ===== Estilos propios del Ejercicio 3 =====
       Reutilizan las mismas clases visuales que el Ejercicio 2
       para que ambas páginas se vean igual. ===== */

    .formulario {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 140px;
    }

    .campo label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-texto-suave);
    }

    .campo input {
      padding: 9px 10px;
      border: 1px solid var(--color-borde);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .campo input:focus {
      outline: 2px solid var(--color-primario);
      border-color: var(--color-primario);
    }

    .error {
      color: #c62828;
      font-size: 0.9rem;
      margin-top: 12px;
      min-height: 1.2em;
    }

    .tabla {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    .tabla th,
    .tabla td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--color-borde);
    }

    .tabla th {
      background-color: #eef1f8;
      color: var(--color-primario-oscuro);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .tabla tbody tr:hover {
      background-color: #f7f9fd;
    }

    .vacio td {
      text-align: center;
      color: var(--color-texto-suave);
      font-style: italic;
    }

    .boton-quitar {
      background-color: #ef5350;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .boton-quitar:hover {
      background-color: #e53935;
    }
  </style>

  <!-- ===== Carga de React por CDN ===== -->
  <!-- React: librería principal -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <!-- ReactDOM: se encarga de renderizar en el navegador -->
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel standalone: permite escribir JSX directo en el navegador, sin build -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <header class="encabezado">
    <h1>Ejercicio 3 — Personas con React</h1>
    <p>Misma funcionalidad del Ejercicio 2, ahora con componentes y estado de React</p>
  </header>

  <!-- React monta toda la aplicación dentro de este contenedor -->
  <main class="contenedor">
    <div id="raiz"></div>

    <a class="volver" href="index.html">&larr; Volver al inicio</a>
  </main>

  <!-- type="text/babel" hace que Babel transforme el JSX antes de ejecutarlo -->
  <script type="text/babel">
    const { useState } = React;

    /**
     * Calcula el IMC: peso / (altura * altura), redondeado a 1 decimal.
     * Es una función auxiliar pura, fuera de los componentes.
     */
    function calcularImc(peso, altura) {
      return (peso / (altura * altura)).toFixed(1);
    }

    /**
     * Formulario de carga de una persona.
     * Es un componente "controlado": cada input guarda su valor en el estado.
     * Cuando se envía, valida y avisa al padre mediante la prop onAgregar.
     */
    function FormularioPersona({ onAgregar }) {
      // Un estado por cada campo del formulario.
      const [nombre, setNombre] = useState("");
      const [apellido, setApellido] = useState("");
      const [edad, setEdad] = useState("");
      const [altura, setAltura] = useState("");
      const [peso, setPeso] = useState("");
      // Estado para el mensaje de validación.
      const [error, setError] = useState("");

      // Maneja el envío del formulario.
      function manejarEnvio(evento) {
        evento.preventDefault(); // evita recargar la página

        // Convertimos los textos a números para validar y guardar.
        const persona = {
          nombre: nombre.trim(),
          apellido: apellido.trim(),
          edad: parseInt(edad, 10),
          altura: parseFloat(altura),
          peso: parseFloat(peso)
        };

        // Validación básica: nada vacío y números mayores a cero.
        if (persona.nombre === "" || persona.apellido === "") {
          setError("El nombre y el apellido son obligatorios.");
          return;
        }
        if (isNaN(persona.edad) || persona.edad <= 0) {
          setError("La edad debe ser un número mayor a cero.");
          return;
        }
        if (isNaN(persona.altura) || persona.altura <= 0) {
          setError("La altura debe ser un número mayor a cero (en metros).");
          return;
        }
        if (isNaN(persona.peso) || persona.peso <= 0) {
          setError("El peso debe ser un número mayor a cero (en kg).");
          return;
        }

        // Todo válido: avisamos al padre y limpiamos el formulario.
        onAgregar(persona);
        setError("");
        setNombre("");
        setApellido("");
        setEdad("");
        setAltura("");
        setPeso("");
      }

      return (
        <section className="panel">
          <h2 style={{ color: "var(--color-primario-oscuro)", marginBottom: "16px" }}>
            Cargar persona
          </h2>

          <form className="formulario" onSubmit={manejarEnvio}>
            <div className="campo">
              <label>Nombre</label>
              <input
                type="text"
                value={nombre}
                onChange={(e) => setNombre(e.target.value)}
                placeholder="Juan"
              />
            </div>
            <div className="campo">
              <label>Apellido</label>
              <input
                type="text"
                value={apellido}
                onChange={(e) => setApellido(e.target.value)}
                placeholder="Pérez"
              />
            </div>
            <div className="campo">
              <label>Edad</label>
              <input
                type="number"
                value={edad}
                onChange={(e) => setEdad(e.target.value)}
                placeholder="30"
                min="0"
              />
            </div>
            <div className="campo">
              <label>Altura (m)</label>
              <input
                type="number"
                value={altura}
                onChange={(e) => setAltura(e.target.value)}
                placeholder="1.75"
                step="0.01"
                min="0"
              />
            </div>
            <div className="campo">
              <label>Peso (kg)</label>
              <input
                type="number"
                value={peso}
                onChange={(e) => setPeso(e.target.value)}
                placeholder="70"
                step="0.1"
                min="0"
              />
            </div>
            <div className="campo" style={{ flex: "0 0 auto" }}>
              <button type="submit" className="boton">Agregar</button>
            </div>
          </form>

          {/* El mensaje de error solo aparece si hay texto en el estado */}
          <p className="error">{error}</p>
        </section>
      );
    }

    /**
     * Tabla que muestra todas las personas recibidas por props.
     * Si no hay personas, muestra una fila informativa.
     */
    function TablaPersonas({ personas, onQuitar }) {
      return (
        <section className="panel">
          <h2 style={{ color: "var(--color-primario-oscuro)", marginBottom: "16px" }}>
            Personas cargadas
          </h2>

          <table className="tabla">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura (m)</th>
                <th>Peso (kg)</th>
                <th>IMC</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              {personas.length === 0 ? (
                <tr className="vacio">
                  <td colSpan="7">Todavía no hay personas cargadas.</td>
                </tr>
              ) : (
                personas.map((persona) => (
                  <tr key={persona.id}>
                    <td>{persona.nombre}</td>
                    <td>{persona.apellido}</td>
                    <td>{persona.edad}</td>
                    <td>{persona.altura}</td>
                    <td>{persona.peso}</td>
                    {/* El IMC se calcula al vuelo a partir de peso y altura */}
                    <td>{calcularImc(persona.peso, persona.altura)}</td>
                    <td>
                      <button
                        className="boton-quitar"
                        onClick={() => onQuitar(persona.id)}
                      >
                        Quitar
                      </button>
                    </td>
                  </tr>
                ))
              )}
            </tbody>
          </table>
        </section>
      );
    }

    /**
     * Componente principal: mantiene el listado de personas en su estado
     * y conecta el formulario con la tabla.
     */
    function App() {
      // Estado con todas las personas cargadas.
      const [personas, setPersonas] = useState([]);
      // Contador de id para identificar cada persona.
      const [proximoId, setProximoId] = useState(1);

      // Agrega una persona nueva al estado (la recibe del formulario).
      function agregarPersona(persona) {
        const nueva = { ...persona, id: proximoId };
        setPersonas([...personas, nueva]);
        setProximoId(proximoId + 1);
      }

      // Quita del estado la persona cuyo id coincide.
      // Usamos filter para crear un arreglo nuevo sin esa persona.
      function quitarPersona(id) {
        setPersonas(personas.filter((p) => p.id !== id));
      }

      return (
        <React.Fragment>
          <FormularioPersona onAgregar={agregarPersona} />
          <TablaPersonas personas={personas} onQuitar={quitarPersona} />
        </React.Fragment>
      );
    }

    // Creamos la raíz de React 18 y montamos el componente App.
    const raiz = ReactDOM.createRoot(document.getElementById("raiz"));
    raiz.render(<App />);
  </script>
</body>
</html>
